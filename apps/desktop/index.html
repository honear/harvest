<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harvest</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <span class="leaf">🌱</span>
          <h1>Harvest</h1>
        </div>
        <div class="preset-bar">
          <select id="preset-select" title="Presets">
            <option value="">Preset…</option>
          </select>
          <button id="preset-save" class="ghost" title="Save current settings as a preset">Save</button>
          <button id="preset-delete" class="ghost" title="Delete selected preset">Delete</button>
        </div>
      </header>

      <section class="panel">
        <h2>Source</h2>
        <div class="path-row">
          <input id="source" placeholder="Choose the folder or card to copy from…" readonly />
          <button id="pick-source">Browse…</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Destinations</h2>
          <button id="add-dest" class="ghost">+ Add destination</button>
        </div>
        <ul id="dest-list" class="dest-list"></ul>
      </section>

      <section class="panel">
        <h2>Options</h2>
        <div class="grid">
          <label>Checksum
            <select id="hash">
              <option value="xxh64">xxHash64 (fast, MHL standard)</option>
              <option value="xxh3">xxHash3 (fastest)</option>
              <option value="md5">MD5 (compatibility)</option>
            </select>
          </label>
          <label class="check">
            <input type="checkbox" id="verify" checked />
            Read-back verification
          </label>
          <label class="check">
            <input type="checkbox" id="resume" />
            Resume / skip already-copied
          </label>
          <label class="check">
            <input type="checkbox" id="manifest" checked />
            Write manifest
          </label>
        </div>

        <details class="advanced">
          <summary>Filters &amp; folder template</summary>
          <div class="grid">
            <label>Include extensions
              <input id="include-ext" placeholder="mov,mxf,wav" />
            </label>
            <label>Exclude extensions
              <input id="exclude-ext" placeholder="tmp,thm" />
            </label>
            <label>Min size
              <input id="min-size" placeholder="e.g. 10MB" />
            </label>
            <label>Max size
              <input id="max-size" placeholder="e.g. 4GB" />
            </label>
            <label>Modified after
              <input id="newer-than" placeholder="YYYY-MM-DD" />
            </label>
            <label>Modified before
              <input id="older-than" placeholder="YYYY-MM-DD" />
            </label>
            <label>Project name
              <input id="project" placeholder="e.g. BeachShoot" />
            </label>
            <label class="wide">Destination template
              <input id="dest-template" placeholder="{project}/{YYYY}-{MM}-{DD}/{filename}" />
            </label>
          </div>
        </details>
      </section>

      <section class="actionbar">
        <button id="start" class="primary">Harvest</button>
        <div id="status" class="status"></div>
      </section>

      <section class="panel progress-panel" id="progress-panel" hidden>
        <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
        <div class="progress-meta">
          <span id="progress-text">Preparing…</span>
          <span id="progress-current" class="muted"></span>
        </div>
      </section>

      <section class="panel result-panel" id="result-panel" hidden>
        <div id="result-summary"></div>
        <pre id="result-detail" class="result-detail"></pre>
      </section>
    </main>
  </body>
</html>
